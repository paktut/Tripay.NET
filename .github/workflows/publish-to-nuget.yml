name: Publish to NuGet

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*' # Trigger on version tags like v1.0.0, v1.2.3-beta, etc.

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x' # Targeting .NET 9

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack
        run: |
          # Get the version from the tag, removing the 'v' prefix
          VERSION=$(echo $GITHUB_REF_NAME | sed 's/^v//')
          dotnet pack src/Tripay.NET/Tripay.NET.csproj --configuration Release -p:PackageVersion=$VERSION -o ./nuget

      - name: Publish to NuGet
        run: dotnet nuget push ./nuget/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
